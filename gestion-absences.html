*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#222;font-size:14px}
a{color:inherit;text-decoration:none}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a237e 0%,#283593 100%)}
.login-box{background:#fff;border-radius:12px;padding:40px 36px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{color:#1a237e;font-size:18px;font-weight:700;margin-top:8px}
.login-logo p{color:#666;font-size:12px;margin-top:4px}
.login-box label{display:block;font-weight:600;margin-bottom:4px;color:#444;font-size:13px}
.login-box input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:16px;transition:border .2s}
.login-box input:focus{outline:none;border-color:#1a237e}
.btn-login{width:100%;padding:11px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-login:hover{background:#283593}
.login-err{color:#c62828;font-size:13px;text-align:center;margin-top:8px}

/* HEADER */
.header{background:#1a237e;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-user{font-size:12px;opacity:.85}
.btn-logout{padding:6px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:5px;cursor:pointer;font-size:12px}
.btn-logout:hover{background:rgba(255,255,255,.25)}

/* NAV */
.nav{background:#fff;border-bottom:2px solid #e0e0e0;display:flex;overflow-x:auto;padding:0 16px;gap:2px;position:sticky;top:56px;z-index:99}
.nav-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
.nav-btn:hover{color:#1a237e}
.nav-btn.active{color:#1a237e;border-bottom-color:#1a237e}

/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:20px 16px}
.page-title{font-size:20px;font-weight:700;color:#1a237e;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* CARDS */
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;color:#1a237e;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px}

/* STATS DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px}
.stat-icon{font-size:28px;width:44px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:#1a237e}
.stat-lbl{font-size:12px;color:#666;margin-top:1px}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.badge-complet{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.badge-partiel{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.badge-non{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f5f5;padding:9px 10px;text-align:left;font-weight:700;color:#555;border-bottom:2px solid #e0e0e0;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafafa}
.td-actions{display:flex;gap:6px;align-items:center}

/* BUTTONS */
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,opacity .15s;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:#1a237e;color:#fff}
.btn-primary:hover:not(:disabled){background:#283593}
.btn-success{background:#2e7d32;color:#fff}
.btn-success:hover:not(:disabled){background:#388e3c}
.btn-warning{background:#f57c00;color:#fff}
.btn-warning:hover:not(:disabled){background:#ef6c00}
.btn-danger{background:#c62828;color:#fff}
.btn-danger:hover:not(:disabled){background:#b71c1c}
.btn-outline{background:#fff;color:#1a237e;border:1.5px solid #1a237e}
.btn-outline:hover:not(:disabled){background:#e8eaf6}
.btn-sm{padding:4px 10px;font-size:12px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:700;color:#555}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1a237e}
.form-group textarea{resize:vertical;min-height:60px}
.form-full{grid-column:1/-1}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;box-shadow:0 8px 40px rgba(0,0,0,.25);margin:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:16px;font-weight:700;color:#1a237e}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1;padding:0 4px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end}

/* RECUP SECTION */
.recup-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.recup-item{background:#f9fbe7;border:1px solid #dce775;border-radius:6px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.recup-item span{font-size:13px}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px}
.search-bar input{flex:1;min-width:160px}

/* ALERTS */
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px}
.alert-info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.alert-success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.alert-warning{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}

/* RAPPORT */
.rapport-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}

/* AIDE */
.aide-section{margin-bottom:20px}
.aide-section h3{color:#1a237e;font-size:15px;margin-bottom:8px;border-left:4px solid #1a237e;padding-left:8px}
.aide-section p,.aide-section li{font-size:13px;line-height:1.7;color:#444}
.aide-section ul{padding-left:18px}
.aide-section ol{padding-left:18px}

/* PRINT */
@media print{
  .header,.nav,.no-print,.btn,.modal-bg{display:none!important}
  body{background:#fff;font-size:12px}
  .page{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
  .print-header{display:block!important}
  table{font-size:11px}
  th,td{padding:5px 6px}
}
.print-header{display:none;text-align:center;margin-bottom:16px}
.print-header h2{font-size:16px;color:#1a237e}
.print-header p{font-size:12px;color:#666}
.print-sig{margin-top:40px;display:grid;grid-template-columns:1fr 1fr;gap:40px;page-break-inside:avoid}
.print-sig div{border-top:1px solid #333;padding-top:8px;font-size:12px;text-align:center}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:8px}
.empty-state p{font-size:13px}

/* CHIP TYPE */
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.chip-ens{background:#e3f2fd;color:#1565c0}
.chip-pers{background:#f3e5f5;color:#6a1b9a}

@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .rapport-filters{grid-template-columns:1fr}
}
</style>

// ===== UTILS =====
const uid = () => Math.random().toString(36).slice(2,10)+Date.now().toString(36);

const fmt = d => {
  if(!d) return '';
  const [y,m,j] = d.split('-');
  return `${j}/${m}/${y}`;
};

const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MOTIFS = ['Formation','Maladie','Convocation administrative','Concours/Examen','Visite médicale','Raison familiale','Autre'];

const totalRecup = abs => (abs.recuperations||[]).reduce((s,r)=>s+(+r.heures||0),0);

const statut = abs => {
  const r = totalRecup(abs);
  const h = +abs.heuresAbsence||0;
  if(h===0) return 'complet';
  if(r >= h) return 'complet';
  if(r > 0) return 'partiel';
  return 'non';
};

const statutLabel = s => s==='complet' ? '✅ Complet' : s==='partiel' ? '⚠️ Partiel' : '❌ Non effectué';
const statutClass = s => s==='complet' ? 'badge-complet' : s==='partiel' ? 'badge-partiel' : 'badge-non';

const STORAGE_KEY = 'gestion_abs_elfort_v1';

const loadData = () => {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if(d) return JSON.parse(d);
  } catch(e){}
  return { personnel: INIT_PERSONNEL, absences: [] };
};

const saveData = data => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
};

// ===== COMPOSANT: BADGE STATUT =====
const StatutBadge = ({abs}) => {
  const s = statut(abs);
  return <span className={`badge ${statutClass(s)}`}>{statutLabel(s)}</span>;
};

const ModalAbsence = ({personnel, initial, onSave, onClose}) => {
  const blank = {
    id: uid(), personnelId:'', dateDebut:'', dateFin:'',
    heuresAbsence:'', motif:'', observations:'', recuperations:[]
  };
  const [form, setForm] = useState(initial ? {...initial, recuperations:[...(initial.recuperations||[])]} : blank);
  const [recupForm, setRecupForm] = useState({date:'', heures:'', description:''});
  const [err, setErr] = useState('');

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const addRecup = () => {
    if(!recupForm.date||!recupForm.heures) { setErr('Date et heures de récupération requises.'); return; }
    setForm(f=>({...f, recuperations:[...f.recuperations,{id:uid(),...recupForm}]}));
    setRecupForm({date:'',heures:'',description:''});
    setErr('');
  };

  const delRecup = id => setForm(f=>({...f, recuperations:f.recuperations.filter(r=>r.id!==id)}));

  const submit = () => {
    if(!form.personnelId) { setErr('Veuillez sélectionner un membre du personnel.'); return; }
    if(!form.dateDebut) { setErr('La date de début est requise.'); return; }
    if(!form.heuresAbsence||+form.heuresAbsence<=0) { setErr("Le nombre d'heures d'absence est requis."); return; }
    setErr('');
    onSave(form);
  };

  const totalR = totalRecup(form);
  const pct = form.heuresAbsence>0 ? Math.min(100, Math.round(totalR/form.heuresAbsence*100)) : 0;
  const s = statut(form);

  const sorted = [...personnel].sort((a,b)=>a.nom.localeCompare(b.nom));

  return (
    <div className="modal-bg" onClick={e=>e.target.className==='modal-bg'&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2>{initial ? '✏️ Modifier une absence' : '➕ Nouvelle absence'}</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {err && <div className="alert alert-warning">{err}</div>}
          <div className="form-grid">
            <div className="form-group form-full">
              <label>Personnel *</label>
              <select value={form.personnelId} onChange={e=>set('personnelId',e.target.value)}>
                <option value="">-- Sélectionner --</option>
                <optgroup label="Enseignants">
                  {sorted.filter(p=>p.type==='enseignant'&&p.actif!==false).map(p=>(
                    <option key={p.id} value={p.id}>{p.nom} {p.prenom}</option>
                  ))}
                </optgroup>
                <optgroup label="Personnel">
                  {sorted.filter(p=>p.type==='personnel'&&p.actif!==false).map(p=>(
                    <option key={p.id} value={p.id}>{p.nom} {p.prenom} — {p.fonction}</option>
                  ))}
                </optgroup>
              </select>
            </div>
            <div className="form-group">
              <label>Date début *</label>
              <input type="date" value={form.dateDebut} onChange={e=>set('dateDebut',e.target.value)}/>
            </div>
            <div className="form-group">
              <label>Date fin (si période)</label>
              <input type="date" value={form.dateFin} onChange={e=>set('dateFin',e.target.value)}/>
            </div>
            <div className="form-group">
              <label>Heures d'absence *</label>
              <input type="number" min="0" step="0.5" value={form.heuresAbsence} onChange={e=>set('heuresAbsence',e.target.value)} placeholder="ex: 3"/>
            </div>
            <div className="form-group">
              <label>Motif</label>
              <select value={form.motif} onChange={e=>set('motif',e.target.value)}>

              <textarea value={form.observations} onChange={e=>set('observations',e.target.value)} rows={2}/>

          {/* RÉCUPÉRATIONS */}

              <div style={{marginBottom:10}}>

                  <span>Heures récupérées : <strong>{totalR}h</strong> / <strong>{form.heuresAbsence}h</strong></span>
                  <span><StatutBadge abs={form}/></span>

                  <div className="progress-fill" style={{width:pct+'%',background:s==='complet'?'#2e7d32':s==='partiel'?'#f57c00':'#e0e0e0'}}/>

  );

const Dashboard = ({personnel, absences}) => {
  const now = new Date();
  const mois = now.getMonth();
  const annee = now.getFullYear();

  const absMois = absences.filter(a=>{
    const d = new Date(a.dateDebut);
    return d.getMonth()===mois && d.getFullYear()===annee;
  });

  const complets = absences.filter(a=>statut(a)==='complet').length;
  const partiels = absences.filter(a=>statut(a)==='partiel').length;
  const nonFaits = absences.filter(a=>statut(a)==='non').length;
  const totalH = absences.reduce((s,a)=>s+(+a.heuresAbsence||0),0);
  const recupH = absences.reduce((s,a)=>s+totalRecup(a),0);

  const recent = [...absences].sort((a,b)=>b.dateDebut.localeCompare(a.dateDebut)).slice(0,8);

  const getPers = id => personnel.find(p=>p.id===id);

  return (
    <div className="page">
      <div className="page-title">📊 Tableau de bord</div>

      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-icon">📋</div>
          <div><div className="stat-val">{absences.length}</div><div className="stat-lbl">Absences totales</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">📅</div>
          <div><div className="stat-val">{absMois.length}</div><div className="stat-lbl">Ce mois ({MONTHS[mois]})</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">⏱️</div>
          <div><div className="stat-val">{totalH}h</div><div className="stat-lbl">Heures d'absence</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">✅</div>
          <div><div className="stat-val" style={{color:'#2e7d32'}}>{complets}</div><div className="stat-lbl">Récup. complètes</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">⚠️</div>
          <div><div className="stat-val" style={{color:'#f57c00'}}>{partiels}</div><div className="stat-lbl">Récup. partielles</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">❌</div>
          <div><div className="stat-val" style={{color:'#c62828'}}>{nonFaits}</div><div className="stat-lbl">Non effectuées</div></div>
        </div>
      </div>

      {nonFaits+partiels > 0 && (
        <div className="alert alert-warning">
          ⚠️ <strong>{nonFaits+partiels} absence(s)</strong> avec récupérations incomplètes ou manquantes.
        </div>
      )}

      <div className="card">
        <div className="card-title">📌 Dernières absences saisies</div>
        {recent.length===0 ? (
          <div className="empty-state"><div className="icon">📭</div><p>Aucune absence enregistrée.</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nom / Prénom</th>
                  <th>Fonction</th>
                  <th>Période</th>
                  <th>Heures</th>
                  <th>Récupérées</th>
                  <th>Statut</th>
                </tr>
              </thead>
              <tbody>
                {recent.map(a=>{
                  const p = getPers(a.personnelId);
                  const r = totalRecup(a);
                  return (
                    <tr key={a.id}>
                      <td><strong>{p?p.nom+' '+p.prenom:'—'}</strong></td>
                      <td><span style={{fontSize:12,color:'#666'}}>{p?p.fonction:''}</span></td>
                      <td>{fmt(a.dateDebut)}{a.dateFin&&a.dateFin!==a.dateDebut?' → '+fmt(a.dateFin):''}</td>
                      <td>{a.heuresAbsence}h</td>
                      <td>{r}h</td>
                      <td><StatutBadge abs={a}/></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};

const AbsencesPage = ({personnel, absences, onAdd, onEdit, onDelete, role}) => {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('');
  const [filterStatut, setFilterStatut] = useState('');
  const [filterMois, setFilterMois] = useState('');
  const [filterAnnee, setFilterAnnee] = useState('');

  const getPers = id => personnel.find(p=>p.id===id);

  const annees = useMemo(()=>{
    const s = new Set(absences.map(a=>a.dateDebut.slice(0,4)));
    return [...s].sort().reverse();
  },[absences]);

  const filtered = useMemo(()=>{
    return absences.filter(a=>{
      const p = getPers(a.personnelId);
      if(!p) return false;
      if(filterType && p.type!==filterType) return false;
      if(filterStatut && statut(a)!==filterStatut) return false;
      if(filterMois && a.dateDebut.slice(5,7)!==filterMois) return false;
      if(filterAnnee && a.dateDebut.slice(0,4)!==filterAnnee) return false;
      if(search){
        const q = search.toLowerCase();
        if(!(p.nom+' '+p.prenom+' '+p.fonction).toLowerCase().includes(q)) return false;
      }
      return true;
    }).sort((a,b)=>b.dateDebut.localeCompare(a.dateDebut));
  },[absences, search, filterType, filterStatut, filterMois, filterAnnee, personnel]);

  const openAdd = ()=>{ setEditing(null); setShowModal(true); };
  const openEdit = a=>{ setEditing(a); setShowModal(true); };

  const handleSave = form => {
    if(editing) onEdit(form);
    else onAdd(form);
    setShowModal(false);
  };

  const confirmDelete = id => {
    if(window.confirm('Supprimer cette absence ?')) onDelete(id);
  };

  return (
    <div className="page">
      <div className="page-title" style={{justifyContent:'space-between'}}>
        <span>📋 Absences de service</span>
        <button className="btn btn-primary" onClick={openAdd}>➕ Nouvelle absence</button>
      </div>

      <div className="card">
        <div className="search-bar">
          <input placeholder="🔍 Rechercher un nom…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="">Tous (enseignants + personnel)</option>
            <option value="enseignant">Enseignants</option>
            <option value="personnel">Personnel</option>
          </select>

// ===== PAGE: PERSONNEL =====
const PersonnelPage = ({personnel, absences, onAdd, onEdit, onDelete}) => {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('');

  const filtered = useMemo(()=>{
    return personnel.filter(p=>{
      if(filterType && p.type!==filterType) return false;
      if(search){
        const q = search.toLowerCase();
        return (p.nom+' '+p.prenom+' '+p.fonction).toLowerCase().includes(q);
      }
      return true;
    }).sort((a,b)=>a.nom.localeCompare(b.nom));
  },[personnel,search,filterType]);

  const countAbs = id => absences.filter(a=>a.personnelId===id).length;

  const openAdd = ()=>{ setEditing(null); setShowModal(true); };
  const openEdit = p=>{ setEditing(p); setShowModal(true); };

  const confirmDelete = id => {
    const nb = countAbs(id);
    if(nb>0 && !window.confirm(`Ce membre a ${nb} absence(s) enregistrée(s). Supprimer quand même ?`)) return;
    if(nb===0 && !window.confirm('Supprimer ce membre du personnel ?')) return;
    onDelete(id);
  };

  const handleSave = form => {
    if(editing) onEdit(form);
    else onAdd(form);
    setShowModal(false);
  };

  const ens = personnel.filter(p=>p.type==='enseignant').length;
  const pers = personnel.filter(p=>p.type==='personnel').length;

  return (
    <div className="page">
      <div className="page-title" style={{justifyContent:'space-between'}}>
        <span>👤 Gestion du personnel</span>
        <button className="btn btn-primary" onClick={openAdd}>➕ Ajouter</button>

      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div className="stat-card" style={{flex:'1',minWidth:140}}>

        </div>
        <div className="stat-card" style={{flex:'1',minWidth:140}}>
          <div className="stat-icon">🧑‍💼</div>
          <div><div className="stat-val">{pers}</div><div className="stat-lbl">Personnel</div></div>
        </div>
        <div className="stat-card" style={{flex:'1',minWidth:140}}>
          <div className="stat-icon">👥</div>
          <div><div className="stat-val">{ens+pers}</div><div className="stat-lbl">Total</div></div>
        </div>
      </div>

      <div className="card">
        <div className="search-bar">
          <input placeholder="🔍 Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="">Tous</option>
            <option value="enseignant">Enseignants</option>
            <option value="personnel">Personnel</option>
          </select>
        </div>
        <div style={{fontSize:12,color:'#888',marginBottom:8}}>{filtered.length} membre(s)</div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr><th>Nom</th><th>Prénom</th><th>Civilité</th><th>Catégorie</th><th>Fonction</th><th>Absences</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {filtered.map(p=>(
                <tr key={p.id} style={{opacity:p.actif===false?.5:1}}>
                  <td><strong>{p.nom}</strong></td>
                  <td>{p.prenom}</td>
                  <td>{p.civilite}</td>
                  <td><span className={`chip ${p.type==='enseignant'?'chip-ens':'chip-pers'}`}>{p.type==='enseignant'?'Enseignant':'Personnel'}</span></td>

const parsePersonnelXlsx = (wb) => {
  // Cherche la feuille contenant les colonnes Nom / Prénoms / Fonction
  const sheetName = wb.SheetNames.find(n => {
    const ws = wb.Sheets[n];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    return rows.some(r => r.some(c => String(c).trim() === 'Nom'));
  }) || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

  // Trouver la ligne d'en-tête (celle qui contient "Nom")
  const hIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Nom'));
  if(hIdx === -1) return null;
  const headers = rows[hIdx].map(c => String(c).trim());
  const iNom = headers.indexOf('Nom');
  const iPrenom = headers.findIndex(h => /pr[eé]nom/i.test(h));
  const iFonction = headers.findIndex(h => /fonction/i.test(h));
  const iCivilite = headers.findIndex(h => /civilit/i.test(h));

  const SKIP = /inspecteur|médecin|service reprographie|accueil lycee/i;
  const result = [];
  for(let i = hIdx+1; i < rows.length; i++){
    const r = rows[i];
    const nom = String(r[iNom]||'').trim();
    if(!nom || SKIP.test(nom)) continue;
    const prenom = String(iPrenom>=0 ? r[iPrenom] : '').trim();
    const fonction = String(iFonction>=0 ? r[iFonction] : '').trim();
    const civilite = String(iCivilite>=0 ? r[iCivilite] : '').trim();
    if(!prenom && !fonction) continue;
    result.push({id:uid(), nom:nom.toUpperCase(), prenom, civilite, fonction, type:'personnel', actif:true});
  }
  return result;
};

const parseEnseignantsXlsx = (wb) => {
  const sheetName = wb.SheetNames.find(n => {
    const ws = wb.Sheets[n];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    return rows.some(r => r.some(c => /^pr[eé]nom$/i.test(String(c).trim())));
  }) || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

  const hIdx = rows.findIndex(r => r.some(c => String(c).trim() === 'Nom'));
  if(hIdx === -1) return null;
  const headers = rows[hIdx].map(c => String(c).trim());
  const iNom = headers.indexOf('Nom');
  const iPrenom = headers.findIndex(h => /^pr[eé]nom$/i.test(h));
  const iCivilite = headers.findIndex(h => /civilit/i.test(h));

  const result = [];
  for(let i = hIdx+1; i < rows.length; i++){
    const r = rows[i];
    const nom = String(r[iNom]||'').trim();
    if(!nom) continue;
    const prenom = String(iPrenom>=0 ? r[iPrenom] : '').trim();
    const civilite = String(iCivilite>=0 ? r[iCivilite] : '').trim();
    const fonction = (civilite==='Mme'||civilite==='Mlle') ? 'Enseignante' : 'Enseignant';
    result.push({id:uid(), nom:nom.toUpperCase(), prenom, civilite, fonction, type:'enseignant', actif:true});
  }
  return result;
};

const ParametresPage = ({data, onRestore}) => {
  const fileRef = useRef();
  const xlsxPersonnelRef = useRef();
  const xlsxEnseignantsRef = useRef();
  const [msg, setMsg] = useState('');
  const [preview, setPreview] = useState(null); // {type, parsed, mode}

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    a.href = url;
    a.download = `absences_elfort_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setMsg('✅ Sauvegarde téléchargée avec succès.');
  };

  const importData = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if(!d.personnel || !d.absences) { setMsg('❌ Fichier invalide.'); return; }
        if(window.confirm(`Restaurer les données ? (${d.personnel.length} personnels, ${d.absences.length} absences)\nCeci remplacera toutes les données actuelles.`)) {
          onRestore(d);
          setMsg('✅ Données restaurées avec succès.');
        }
      } catch(err) { setMsg('❌ Erreur de lecture du fichier.'); }
    };
    reader.readAsText(file);
    e.target.value='';
  };

  const resetData = () => {
    if(window.confirm('⚠️ Réinitialiser TOUTES les absences ?\n\nLe personnel sera conservé. Cette action est irréversible.')) {
      onRestore({...data, absences:[]});
      setMsg('✅ Absences réinitialisées.');
    }
  };

  const readXlsx = (file, type) => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'array'});
        const parsed = type==='enseignant' ? parseEnseignantsXlsx(wb) : parsePersonnelXlsx(wb);
        if(!parsed || parsed.length===0) { setMsg('❌ Aucune donnée trouvée dans ce fichier. Vérifiez le format.'); return; }
        setPreview({type, parsed, mode:'remplacer'});
        setMsg('');
      } catch(e) { setMsg('❌ Erreur de lecture du fichier Excel.'); }
    };
    reader.readAsArrayBuffer(file);
  };

  const handleXlsxChange = type => e => {
    const file = e.target.files[0];
    if(file) readXlsx(file, type);
    e.target.value='';
  };

  const confirmImport = () => {
    if(!preview) return;
    const {type, parsed, mode} = preview;
    let newPersonnel;
    if(mode==='remplacer'){
      const autres = data.personnel.filter(p=>p.type!==type);
      newPersonnel = [...autres, ...parsed];
    } else {
      // Fusion : ajouter uniquement ceux absents (comparaison nom+prénom insensible à la casse)
      const existants = data.personnel.filter(p=>p.type===type);
      const autres = data.personnel.filter(p=>p.type!==type);
      const nouveaux = parsed.filter(p => !existants.some(e=>
        e.nom.toUpperCase()===p.nom.toUpperCase() &&
        e.prenom.toLowerCase()===p.prenom.toLowerCase()
      ));
      newPersonnel = [...autres, ...existants, ...nouveaux];
    }
    onRestore({...data, personnel: newPersonnel});
    const label = type==='enseignant'?'enseignants':'personnels';
    setMsg(`✅ ${parsed.length} ${label} importé(s) avec succès (mode : ${mode}).`);
    setPreview(null);
  };

  return (
    <div className="page">
      <div className="page-title">⚙️ Paramètres</div>

      {msg && <div className={`alert ${msg.startsWith('✅')?'alert-success':'alert-warning'}`}>{msg}</div>}

        <div className="card-title">📥 Importer une liste depuis Excel</div>

          Téléversez un fichier Excel au même format que <strong>PERONNEL.xlsx</strong> ou <strong>ENSEIGNANTS.xlsx</strong>
          pour mettre à jour la liste du personnel ou des enseignants.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:12,marginBottom:16}}>

            <p style={{fontSize:12,color:'#555',marginBottom:10}}>
              Format attendu : colonnes <code>Civilité</code>, <code>Nom</code>, <code>Prénom</code>.
              Même structure que <em>ENSEIGNANTS.xlsx</em>.
            </p>
            <button className="btn btn-outline btn-sm" style={{borderColor:'#1565c0',color:'#1565c0'}} onClick={()=>xlsxEnseignantsRef.current.click()}>
              📂 Choisir le fichier enseignants…
            </button>
            <input type="file" ref={xlsxEnseignantsRef} accept=".xlsx,.xls,.ods" style={{display:'none'}} onChange={handleXlsxChange('enseignant')}/>
          </div>
          <div style={{background:'#f3e5f5',borderRadius:8,padding:14}}>
            <div style={{fontWeight:700,color:'#6a1b9a',marginBottom:6}}>🧑‍💼 Fichier Personnel</div>

      <nav className="nav no-print">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </nav>

      {tab==='dashboard' && <Dashboard personnel={data.personnel} absences={data.absences}/>}
      {tab==='absences' && <AbsencesPage personnel={data.personnel} absences={data.absences} onAdd={addAbsence} onEdit={editAbsence} onDelete={delAbsence} role={user.role}/>}
      {tab==='personnel' && <PersonnelPage personnel={data.personnel} absences={data.absences} onAdd={addPersonnel} onEdit={editPersonnel} onDelete={delPersonnel}/>}
      {tab==='rapports' && <RapportsPage personnel={data.personnel} absences={data.absences}/>}
      {tab==='parametres' && <ParametresPage data={data} onRestore={restore}/>}
      {tab==='aide' && <AidePage/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
